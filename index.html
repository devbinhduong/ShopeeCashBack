<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Cashback Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Hoàn Tiền Shopee</h1>
        <p>Nhập link sản phẩm Shopee để tạo link hoàn tiền và nhiều ưu đãi khác.</p>

        <div class="input-group">
            <label for="shopeeUrl">Link Sản phẩm Shopee</label>
            <div class="input-with-button">
                <input type="url" id="shopeeUrl" placeholder="VD: https://shopee.vn/ten-san-pham-i.123456.7890" autocomplete="off">
                <button type="button" class="clear-btn hidden action-btn" id="clearBtn" aria-label="Xóa">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <button type="button" class="paste-btn action-btn" id="pasteBtn">Dán</button>
            </div>
            <div id="errorMsg" class="error-message">Vui lòng nhập Link Shopee hợp lệ.</div>
            <button id="generateBtn">
                <span id="btnText">Tạo Link Hoàn Tiền</span>
                <div id="loader" class="loader"></div>
            </button>
        </div>

        <div id="resultBox" class="result-box">
            <div class="result-title">Link Hoàn Tiền của Bạn</div>
            <div class="result-group">
              <div class="result-link" id="resultLink">https://go.accesstrade.vn/...</div>
              <a href="#" class="result-copy-icon" id="copyIcon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round">
                  </g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M6 11C6 8.17157 6 6.75736 6.87868 5.87868C7.75736 5 9.17157 5 12 5H15C17.8284 5 19.2426 5 20.1213 5.87868C21 6.75736 21 8.17157 21 11V16C21 18.8284 21 20.2426 20.1213 21.1213C19.2426 22 17.8284 22 15 22H12C9.17157 22 7.75736 22 6.87868 21.1213C6 20.2426 6 18.8284 6 16V11Z"
                      stroke="currentColor" stroke-width="1.5"></path>
                    <path opacity="0.5"
                      d="M6 19C4.34315 19 3 17.6569 3 16V10C3 6.22876 3 4.34315 4.17157 3.17157C5.34315 2 7.22876 2 11 2H15C16.6569 2 18 3.34315 18 5"
                      stroke="currentColor" stroke-width="1.5"></path>
                  </g>
                </svg>

                <span class="copy-floating-text">Đã sao chép!</span>
              </a>
            </div>
            <a href="#" class="button" target="_blank" id="productLink">Mở sản phẩm</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
