name: Update Products Data

on:
  schedule:
    # Runs every hour at minute 0 (UTC). 
    # Vietnam time (UTC+7): 00:00 UTC = 07:00 VN, 08:00 UTC = 15:00 VN, etc.
    # Runs at: 01:00, 03:00, 08:00, 15:00 VN time (key flash sale hours)
    - cron: '0 18,20,1,8 * * *'   # 01:00, 03:00, 08:00, 15:00 VN (18, 20, 1, 8 UTC)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-products:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run product update script
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          CAMPAIGN_ID: ${{ secrets.CAMPAIGN_ID }}
        run: node run_all.js

      - name: Commit and push updated products_data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add products_data.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: auto-update products data [skip ci]"
          git push
